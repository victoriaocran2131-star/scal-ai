<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <title>Scal AI - Sign In</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🍽️</div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue to Scal AI</p>
            </div>

            <div id="g_id_onload" data-callback="handleGoogleCredential"></div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-width="100%" style="margin-bottom: 16px;"></div>

            <div class="auth-divider">
                <span>or sign in with email</span>
            </div>

            <form class="auth-form" id="signinForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>

                <div class="error-message" id="errorMessage" style="display: none;"></div>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>

            <a href="welcome.html" class="back-link">← Back to Welcome</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        function handleGoogleCredential(response) {
            fetch(API_BASE + '/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('scalai_token', data.token);
                    localStorage.setItem('scalai_user', JSON.stringify(data.user));
                    
                    if (data.hasActiveSubscription) {
                        localStorage.setItem('hasActiveSubscription', 'true');
                    }
                    
                    if (data.requiresSubscription) {
                        window.location.href = 'subscription.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    document.getElementById('errorMessage').textContent = data.error || 'Google sign-in failed';
                    document.getElementById('errorMessage').style.display = 'block';
                }
            })
            .catch(() => {
                document.getElementById('errorMessage').textContent = 'Connection failed. Please try again.';
                document.getElementById('errorMessage').style.display = 'block';
            });
        }
        
        // Email sign-in
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'none';
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing In...';
            
            try {
                const response = await fetch(API_BASE + '/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to sign in');
                }
                
                localStorage.setItem('scalai_token', data.token);
                localStorage.setItem('scalai_user', JSON.stringify(data.user));
                
                if (data.hasActiveSubscription) {
                    localStorage.setItem('hasActiveSubscription', 'true');
                } else {
                    localStorage.removeItem('hasActiveSubscription');
                }
                
                if (data.requiresSubscription) {
                    window.location.href = 'subscription.html';
                } else {
                    window.location.href = 'index.html';
                }
                
            } catch (error) {
                errorMessage.textContent = error.message || 'Connection failed. Please try again.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
