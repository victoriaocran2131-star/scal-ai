<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scal AI - Download Logo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #09090b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #fff;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #c9a227 0%, #f4d03f 50%, #c9a227 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #666;
            margin-bottom: 40px;
        }
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            max-width: 900px;
            width: 100%;
        }
        .download-card {
            background: #18181b;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 30px;
            text-align: center;
        }
        .preview-box {
            background: #0a0a0f;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }
        .preview-box.light {
            background: #ffffff;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 20px;
        }
        .size-options {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .size-btn {
            padding: 6px 14px;
            background: rgba(201, 162, 39, 0.1);
            border: 1px solid rgba(201, 162, 39, 0.2);
            border-radius: 8px;
            color: #c9a227;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .size-btn:hover, .size-btn.active {
            background: rgba(201, 162, 39, 0.2);
            border-color: #c9a227;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #c9a227 0%, #d4af37 100%);
            color: #0a0a0f;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201, 162, 39, 0.3);
        }
        canvas { display: none; }
    </style>
</head>
<body>
    <h1>Download Scal AI Logo</h1>
    <p class="subtitle">Click the buttons below to download your logo as PNG</p>

    <div class="download-grid">
        <!-- Full Logo Dark -->
        <div class="download-card">
            <div class="preview-box">
                <svg id="logoDark" width="280" height="80" viewBox="0 0 400 120">
                    <defs>
                        <linearGradient id="goldGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#c9a227"/>
                            <stop offset="50%" style="stop-color:#f4d03f"/>
                            <stop offset="100%" style="stop-color:#c9a227"/>
                        </linearGradient>
                    </defs>
                    <rect width="400" height="120" rx="16" fill="#0a0a0f"/>
                    <g transform="translate(30, 60)">
                        <circle cx="0" cy="0" r="35" fill="none" stroke="#c9a227" stroke-width="2.5"/>
                        <circle cx="0" cy="0" r="25" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.4"/>
                        <g transform="translate(-12, -20)">
                            <line x1="0" y1="0" x2="0" y2="35" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
                            <line x1="-4" y1="0" x2="-4" y2="12" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="0" y1="0" x2="0" y2="12" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="4" y1="0" x2="4" y2="12" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M-4,12 Q-4,16 0,16 Q4,16 4,12" fill="none" stroke="#c9a227" stroke-width="1.5"/>
                        </g>
                        <g transform="translate(12, -20)">
                            <line x1="0" y1="0" x2="0" y2="35" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
                            <path d="M0,0 Q6,8 0,16" fill="#c9a227" opacity="0.6"/>
                        </g>
                    </g>
                    <text x="90" y="72" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#goldGrad1)" letter-spacing="2">SCAL</text>
                    <text x="235" y="72" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="#ffffff" letter-spacing="2">AI</text>
                    <text x="200" y="100" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle" letter-spacing="4">INTELLIGENT FOOD RECOGNITION</text>
                </svg>
            </div>
            <div class="card-title">Full Logo (Dark)</div>
            <div class="card-desc">With background — ideal for dark themes</div>
            <div class="size-options">
                <button class="size-btn active" onclick="setSize(this, 800, 240)">800x240</button>
                <button class="size-btn" onclick="setSize(this, 1200, 360)">1200x360</button>
                <button class="size-btn" onclick="setSize(this, 1600, 480)">1600x480</button>
            </div>
            <button class="download-btn" onclick="downloadLogo('logoDark', 'scal-ai-logo-dark.png')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PNG
            </button>
        </div>

        <!-- Full Logo Light -->
        <div class="download-card">
            <div class="preview-box light">
                <svg id="logoLight" width="280" height="80" viewBox="0 0 400 120">
                    <defs>
                        <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#b8941f"/>
                            <stop offset="50%" style="stop-color:#c9a227"/>
                            <stop offset="100%" style="stop-color:#b8941f"/>
                        </linearGradient>
                    </defs>
                    <rect width="400" height="120" rx="16" fill="#ffffff"/>
                    <g transform="translate(30, 60)">
                        <circle cx="0" cy="0" r="35" fill="none" stroke="#c9a227" stroke-width="2.5"/>
                        <circle cx="0" cy="0" r="25" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.4"/>
                        <g transform="translate(-12, -20)">
                            <line x1="0" y1="0" x2="0" y2="35" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
                            <line x1="-4" y1="0" x2="-4" y2="12" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="0" y1="0" x2="0" y2="12" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="4" y1="0" x2="4" y2="12" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M-4,12 Q-4,16 0,16 Q4,16 4,12" fill="none" stroke="#c9a227" stroke-width="1.5"/>
                        </g>
                        <g transform="translate(12, -20)">
                            <line x1="0" y1="0" x2="0" y2="35" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
                            <path d="M0,0 Q6,8 0,16" fill="#c9a227" opacity="0.6"/>
                        </g>
                    </g>
                    <text x="90" y="72" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#goldGrad2)" letter-spacing="2">SCAL</text>
                    <text x="235" y="72" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="#1a1a2e" letter-spacing="2">AI</text>
                    <text x="200" y="100" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle" letter-spacing="4">INTELLIGENT FOOD RECOGNITION</text>
                </svg>
            </div>
            <div class="card-title">Full Logo (Light)</div>
            <div class="card-desc">White background — ideal for light themes</div>
            <div class="size-options">
                <button class="size-btn active" onclick="setSize(this, 800, 240)">800x240</button>
                <button class="size-btn" onclick="setSize(this, 1200, 360)">1200x360</button>
                <button class="size-btn" onclick="setSize(this, 1600, 480)">1600x480</button>
            </div>
            <button class="download-btn" onclick="downloadLogo('logoLight', 'scal-ai-logo-light.png')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PNG
            </button>
        </div>

        <!-- Icon Only -->
        <div class="download-card">
            <div class="preview-box">
                <svg id="iconLogo" width="100" height="100" viewBox="0 0 120 120">
                    <defs>
                        <linearGradient id="goldGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#c9a227"/>
                            <stop offset="50%" style="stop-color:#f4d03f"/>
                            <stop offset="100%" style="stop-color:#c9a227"/>
                        </linearGradient>
                    </defs>
                    <rect width="120" height="120" rx="24" fill="#0a0a0f"/>
                    <g transform="translate(60, 55)">
                        <circle cx="0" cy="0" r="38" fill="none" stroke="url(#goldGrad3)" stroke-width="2.5"/>
                        <circle cx="0" cy="0" r="27" fill="none" stroke="url(#goldGrad3)" stroke-width="1" opacity="0.4"/>
                        <g transform="translate(-14, -22)">
                            <line x1="0" y1="0" x2="0" y2="38" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
                            <line x1="-5" y1="0" x2="-5" y2="13" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="0" y1="0" x2="0" y2="13" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="5" y1="0" x2="5" y2="13" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M-5,13 Q-5,17 0,17 Q5,17 5,13" fill="none" stroke="#c9a227" stroke-width="1.5"/>
                        </g>
                        <g transform="translate(14, -22)">
                            <line x1="0" y1="0" x2="0" y2="38" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
                            <path d="M0,0 Q7,9 0,18" fill="#c9a227" opacity="0.6"/>
                        </g>
                    </g>
                    <text x="60" y="108" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c9a227" text-anchor="middle" letter-spacing="2">AI</text>
                </svg>
            </div>
            <div class="card-title">Icon Only</div>
            <div class="card-desc">Square icon — for favicons and app icons</div>
            <div class="size-options">
                <button class="size-btn active" onclick="setSize(this, 128, 128)">128x128</button>
                <button class="size-btn" onclick="setSize(this, 256, 256)">256x256</button>
                <button class="size-btn" onclick="setSize(this, 512, 512)">512x512</button>
            </div>
            <button class="download-btn" onclick="downloadLogo('iconLogo', 'scal-ai-icon.png')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PNG
            </button>
        </div>

        <!-- Text Only -->
        <div class="download-card">
            <div class="preview-box">
                <svg id="textLogo" width="240" height="60" viewBox="0 0 300 70">
                    <defs>
                        <linearGradient id="goldGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#c9a227"/>
                            <stop offset="50%" style="stop-color:#f4d03f"/>
                            <stop offset="100%" style="stop-color:#c9a227"/>
                        </linearGradient>
                    </defs>
                    <rect width="300" height="70" rx="10" fill="#0a0a0f"/>
                    <text x="20" y="48" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#goldGrad4)" letter-spacing="2">SCAL</text>
                    <text x="155" y="48" font-family="Arial, sans-serif" font-size="42" font-weight="300" fill="#ffffff" letter-spacing="2">AI</text>
                </svg>
            </div>
            <div class="card-title">Text Only</div>
            <div class="card-desc">Clean text logo — minimal design</div>
            <div class="size-options">
                <button class="size-btn active" onclick="setSize(this, 600, 140)">600x140</button>
                <button class="size-btn" onclick="setSize(this, 900, 210)">900x210</button>
                <button class="size-btn" onclick="setSize(this, 1200, 280)">1200x280</button>
            </div>
            <button class="download-btn" onclick="downloadLogo('textLogo', 'scal-ai-text.png')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PNG
            </button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        let downloadWidth = 800;
        let downloadHeight = 240;

        function setSize(btn, w, h) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            downloadWidth = w;
            downloadHeight = h;
        }

        function downloadLogo(svgId, filename) {
            const svgElement = document.getElementById(svgId);
            const svgData = new XMLSerializer().serializeToString(svgElement);
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = downloadWidth;
            canvas.height = downloadHeight;
            
            const img = new Image();
            const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, downloadWidth, downloadHeight);
                URL.revokeObjectURL(url);
                
                const pngUrl = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = pngUrl;
                downloadLink.download = filename;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            };
            
            img.src = url;
        }
    </script>
</body>
</html>
