<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <title>Scal AI - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🍽️</div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue to Scal AI</p>
            </div>

            <button class="google-btn" id="googleBtn" type="button">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                <span>Continue with Google</span>
            </button>

            <div class="auth-divider">
                <span>or sign in with email</span>
            </div>

            <form class="auth-form" id="signinForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>

                <div class="error-message" id="errorMessage" style="display: none;"></div>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>

            <a href="welcome.html" class="back-link">← Back to Welcome</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer onerror="console.log('Google library blocked - using fallback')"></script>
    <script>
        // Google Sign-In - works with or without Google Cloud project
        function initGoogleSignIn() {
            if (typeof google !== 'undefined' && google.accounts) {
                // Official Google library loaded
                google.accounts.id.initialize({
                    client_id: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
                    callback: handleGoogleCredential
                });
                google.accounts.id.renderButton(
                    document.getElementById('googleBtn'),
                    { type: 'standard', theme: 'outline', size: 'large', width: '100%' }
                );
            } else {
                // Fallback: use Google OAuth popup
                document.getElementById('googleBtn').addEventListener('click', openGooglePopup);
            }
        }
        
        function openGooglePopup() {
            const width = 500, height = 600;
            const left = (screen.width - width) / 2;
            const top = (screen.height - height) / 2;
            
            const googleAuthUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
                'client_id=YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com&' +
                'redirect_uri=' + encodeURIComponent(API_BASE + '/api/auth/google/callback') + '&' +
                'response_type=code&' +
                'scope=email profile openid&' +
                'access_type=offline';
            
            window.open(googleAuthUrl, 'googleAuth', `width=${width},height=${height},left=${left},top=${top}`);
        }
        
        function handleGoogleCredential(response) {
            fetch(API_BASE + '/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('scalai_token', data.token);
                    localStorage.setItem('scalai_user', JSON.stringify(data.user));
                    
                    if (data.hasActiveSubscription) {
                        localStorage.setItem('hasActiveSubscription', 'true');
                    }
                    
                    if (data.requiresSubscription) {
                        window.location.href = 'subscription.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    showError(data.error || 'Google sign-in failed');
                }
            })
            .catch(() => showError('Connection failed. Please try again.'));
        }
        
        function showError(msg) {
            var el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
        }
        
        // Email sign-in
        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing In...';
            
            try {
                const response = await fetch(API_BASE + '/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to sign in');
                }
                
                localStorage.setItem('scalai_token', data.token);
                localStorage.setItem('scalai_user', JSON.stringify(data.user));
                
                if (data.hasActiveSubscription) {
                    localStorage.setItem('hasActiveSubscription', 'true');
                } else {
                    localStorage.removeItem('hasActiveSubscription');
                }
                
                if (data.requiresSubscription) {
                    window.location.href = 'subscription.html';
                } else {
                    window.location.href = 'index.html';
                }
                
            } catch (error) {
                errorMessage.textContent = error.message || 'Connection failed. Please try again.';
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
        
        setTimeout(initGoogleSignIn, 500);
    </script>
</body>
</html>
