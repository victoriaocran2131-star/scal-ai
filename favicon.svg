<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="50%" style="stop-color:#f4d03f"/>
      <stop offset="100%" style="stop-color:#c9a227"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  
  <!-- Plate -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#goldGradient)" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Fork -->
  <g transform="translate(24, 16)">
    <line x1="0" y1="0" x2="0" y2="28" stroke="url(#goldGradient)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-3" y1="0" x2="-3" y2="10" stroke="url(#goldGradient)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="10" stroke="url(#goldGradient)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="3" y1="0" x2="3" y2="10" stroke="url(#goldGradient)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M-3,10 Q-3,13 0,13 Q3,13 3,10" fill="none" stroke="url(#goldGradient)" stroke-width="1.2"/>
  </g>
  
  <!-- Knife -->
  <g transform="translate(40, 16)">
    <line x1="0" y1="0" x2="0" y2="28" stroke="url(#goldGradient)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M0,0 Q5,7 0,14" fill="url(#goldGradient)" opacity="0.6"/>
  </g>
  
  <!-- AI Text -->
  <text x="32" y="58" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="bold" fill="#c9a227" text-anchor="middle" letter-spacing="1">AI</text>
</svg>
