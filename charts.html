<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scal AI - Charts & Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>📊 Charts & Analytics</h1>
            <p>Your nutrition trends over time</p>
        </header>

        <div class="history-controls">
            <button id="backBtn" class="btn btn-secondary">
                <span>←</span> Back to Scanner
            </button>
        </div>

        <div class="charts-period-selector">
            <button class="period-btn active" data-period="7">7 Days</button>
            <button class="period-btn" data-period="14">14 Days</button>
            <button class="period-btn" data-period="30">30 Days</button>
        </div>

        <div class="chart-section">
            <h3>🔥 Calories Trend</h3>
            <div class="chart-container">
                <canvas id="caloriesChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-summary" id="caloriesSummary">
                <span>Average: <strong id="avgCalories">0</strong> cal/day</span>
            </div>
        </div>

        <div class="chart-section">
            <h3>🥩 Protein Trend</h3>
            <div class="chart-container">
                <canvas id="proteinChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-summary">
                <span>Average: <strong id="avgProtein">0</strong> g/day</span>
            </div>
        </div>

        <div class="chart-section">
            <h3>🌾 Carbs Trend</h3>
            <div class="chart-container">
                <canvas id="carbsChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-summary">
                <span>Average: <strong id="avgCarbs">0</strong> g/day</span>
            </div>
        </div>

        <div class="chart-section">
            <h3>🫒 Fat Trend</h3>
            <div class="chart-container">
                <canvas id="fatChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-summary">
                <span>Average: <strong id="avgFat">0</strong> g/day</span>
            </div>
        </div>

        <div class="chart-section">
            <h3>🍽️ Meals Per Day</h3>
            <div class="chart-container">
                <canvas id="mealsChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-summary">
                <span>Average: <strong id="avgMeals">0</strong> meals/day</span>
            </div>
        </div>

        <div class="analytics-summary">
            <h3>📈 Summary</h3>
            <div class="summary-grid">
                <div class="summary-card">
                    <div class="summary-label">Total Meals</div>
                    <div class="summary-value" id="totalMeals">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Total Calories</div>
                    <div class="summary-value" id="totalCaloriesSum">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Best Day</div>
                    <div class="summary-value" id="bestDay">-</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Most Scanned</div>
                    <div class="summary-value" id="mostScanned">-</div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="charts.js"></script>
</body>
</html>
